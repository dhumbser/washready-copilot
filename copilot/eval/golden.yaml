# Golden dataset de evaluacion del agente washready-copilot.
#
# Todas las respuestas se calcularon sobre los datos reales ya
# presentes en la BD local. Fuente de cada respuesta:
#   - rama_esperada: fixed -> llamada real a WashReadyClient (src/washready_client.py)
#   - rama_esperada: sql   -> SQL directo sobre wash_ready_db (ningun endpoint
#     existente cubre desgloses por servicio u operario)
#
# Convencion de negocio verificada en TicketRepository: "facturacion"/"ventas"
# solo cuenta tickets en estado PAGADO o CERRADO (excluye PTE_PAGO y ANULADO),
# salvo que la pregunta pida explicitamente otro estado. Las preguntas de
# rama sql replican esa misma convencion salvo que se indique lo contrario.
#
# rama_esperada y tool_esperada son orientativas para depurar el
# agente (que tool eligio vs. la esperada), no se usan como oraculo estricto.

