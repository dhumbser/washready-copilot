<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}"/>
  <style>
    body, html { height: 100%; margin: 0; }
    .wrap { display: flex; flex-direction: column; height: 100%; }
    header { padding: 8px 12px; display:flex; gap:8px; align-items:center; border-bottom:1px solid var(--border); }
    header .spacer { flex: 1; }
    main { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .alert { margin: 8px 12px; }
    iframe { flex: 1; width: 100%; border: 0; }
    .muted { color:#666; font-size: .92rem; }
    .btn { padding:6px 10px; border-radius:8px; border:1px solid var(--border); background:#fff; cursor:pointer; }
    .btn.secondary { background: #f6f7f8; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <button class="btn secondary" onclick="history.back()">← Volver</button>
      <div class="spacer"></div>
      <a id="openNew" class="btn secondary" href="#" target="_blank" rel="noopener" style="display:none;">Abrir en nueva pestaña</a>
    </header>

    <main>
      <div id="msg" class="alert" style="display:none"></div>
      <iframe id="pdfFrame" title="PDF"></iframe>
    </main>
  </div>
    <script th:src="@{/js/app.js}"></script>
    <script th:src="@{/js/pdf_viewer.js}" defer></script>
</body>
</html>
