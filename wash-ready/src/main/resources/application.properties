spring.application.name=wash-ready

app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}

# =====================================================================
# Configuracion externalizada mediante variables de entorno.
# Los valores reales NO se versionan: definelos en tu entorno o en un
# gestor de secretos. Ver .env.example en la raiz del repositorio.
#
# Requeridas: DB_PASSWORD, JWT_SECRET, BOOTSTRAP_ADMIN_PASSWORD,
#             MAIL_USERNAME, MAIL_PASSWORD
# =====================================================================

# MySQL DataSource
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/wash_ready_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:wash_ready_user}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT (usa un secreto largo y aleatorio, nunca lo commitees)
jwt.secret=${JWT_SECRET}
jwt.access-token-ttl=${JWT_ACCESS_TOKEN_TTL:PT45M}
jwt.refresh-token-ttl=${JWT_REFRESH_TOKEN_TTL:P7D}

# Bootstrap del primer administrador
app.bootstrap-admin.usuario=${BOOTSTRAP_ADMIN_USUARIO:admin}
app.bootstrap-admin.password=${BOOTSTRAP_ADMIN_PASSWORD}

# Correo (SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
